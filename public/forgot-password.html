<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - SAO E-Record System</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--bg-light);
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-gray);
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 32px;
            transition: color 0.2s;
        }

        .back-button:hover {
            color: var(--primary-dark);
        }

        .auth-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-card {
            background: white;
            padding: 48px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(55, 68, 38, 0.1);
            width: 100%;
            max-width: 480px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-container img {
            width: 100px;
            height: 100px;
            margin-bottom: 24px;
        }

        .auth-card h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--text-dark);
            text-align: center;
            margin-bottom: 8px;
        }

        .auth-card p {
            color: var(--text-gray);
            text-align: center;
            margin-bottom: 32px;
            font-size: 14px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-gray);
            font-size: 20px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: all 0.2s;
            background: var(--bg-light);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-green);
            background: white;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--primary-dark);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background: var(--primary-darker);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(55, 68, 38, 0.3);
        }

        .btn-submit:disabled {
            background: var(--text-light);
            cursor: not-allowed;
            transform: none;
        }

        .success-message,
        .error-message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .login-link {
            text-align: center;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-gray);
        }

        .login-link a {
            color: var(--primary-dark);
            text-decoration: none;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
        }

        .login-link a:hover {
            color: var(--primary-darker);
        }

        @media (max-width: 768px) {
            .auth-card {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="login.html" class="back-button">
            <ion-icon name="arrow-back-outline" style="font-size: 20px;"></ion-icon>
            Back to Login
        </a>

        <div class="auth-content">
            <div class="auth-card">
                <div class="logo-container">
                    <img src="https://strategic-azure-2e1tmo9cyy.edgeone.app/IMG_3170.png" alt="School Logo">
                </div>

                <h2>Forgot Password?</h2>
                <p>Enter your email address and we'll send you a link to reset your password.</p>

                <div id="successMessage" class="success-message"></div>
                <div id="errorMessage" class="error-message"></div>

                <form id="forgotPasswordForm">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <div class="input-wrapper">
                            <ion-icon name="mail-outline" class="input-icon"></ion-icon>
                            <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit" id="submitBtn">
                        Send Reset Link
                        <ion-icon name="send-outline" style="font-size: 20px;"></ion-icon>
                    </button>
                </form>

                <div class="login-link">
                    Remember your password? <a href="login.html">Sign in</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script type="module" src="js/forgot-password.js"></script>
</body>
</html>
