<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SAO E-Record System</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-color: var(--bg-light);
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-gray);
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 32px;
            transition: color 0.2s;
        }

        .back-button:hover {
            color: var(--primary-dark);
        }

        .auth-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-card {
            background: white;
            padding: 48px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(55, 68, 38, 0.1);
            width: 100%;
            max-width: 480px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-container img {
            width: 100px;
            height: 100px;
            margin-bottom: 24px;
        }

        .auth-card h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--text-dark);
            text-align: center;
            margin-bottom: 8px;
        }

        .auth-card p {
            color: var(--text-gray);
            text-align: center;
            margin-bottom: 32px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-gray);
            font-size: 20px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: all 0.2s;
            background: var(--bg-light);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-green);
            background: white;
        }

        .form-input::placeholder {
            color: var(--text-light);
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-gray);
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
        }

        .checkbox-label input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .forgot-link {
            color: var(--text-gray);
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: var(--primary-dark);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--primary-dark);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background: var(--primary-darker);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(55, 68, 38, 0.3);
        }

        .btn-submit:disabled {
            background: var(--text-light);
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            text-align: center;
            margin: 32px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: var(--border-color);
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .divider span {
            background: white;
            padding: 0 16px;
            color: var(--text-gray);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .social-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn-social {
            padding: 12px;
            background: var(--bg-light);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-social:hover {
            background: var(--secondary-green);
            border-color: var(--primary-green);
        }

        .register-link {
            text-align: center;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
            font-size: 14px;
            color: var(--text-gray);
        }

        .register-link a {
            color: var(--primary-dark);
            text-decoration: none;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
        }

        .register-link a:hover {
            color: var(--primary-darker);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            display: none;
        }

        @media (max-width: 768px) {
            .auth-card {
                padding: 32px 24px;
            }
            .social-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="index.html" class="back-button">
            <ion-icon name="arrow-back-outline" style="font-size: 20px;"></ion-icon>
            Back to Home
        </a>

        <div class="auth-content">
            <div class="auth-card">
                <div class="logo-container">
                    <img src="https://strategic-azure-2e1tmo9cyy.edgeone.app/IMG_3170.png" alt="School Logo">
                </div>

                <h2>Welcome Back</h2>
                <p>Sign in to access your portal</p>

                <div id="errorMessage" class="error-message"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <div class="input-wrapper">
                            <ion-icon name="mail-outline" class="input-icon"></ion-icon>
                            <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <div class="input-wrapper">
                            <ion-icon name="lock-closed-outline" class="input-icon"></ion-icon>
                            <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
                        </div>
                    </div>

                    <div class="form-footer">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe">
                            Remember me for 30 days
                        </label>
                        <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn-submit" id="submitBtn">
                        Sign In
                        <ion-icon name="arrow-forward-outline" style="font-size: 20px;"></ion-icon>
                    </button>
                </form>

                <div class="divider">
                    <span>Or continue with</span>
                </div>

                <div class="social-buttons">
                    <button class="btn-social" id="googleBtn">
                        <ion-icon name="logo-google" style="font-size: 18px; vertical-align: middle; margin-right: 8px;"></ion-icon>
                        Google
                    </button>
                    <button class="btn-social" id="facebookBtn">
                        <ion-icon name="logo-facebook" style="font-size: 18px; vertical-align: middle; margin-right: 8px;"></ion-icon>
                        Facebook
                    </button>
                    <button class="btn-social" id="githubBtn">
                        <ion-icon name="logo-github" style="font-size: 18px; vertical-align: middle; margin-right: 8px;"></ion-icon>
                        GitHub
                    </button>
                    <button class="btn-social" id="linkedinBtn">
                        <ion-icon name="logo-linkedin" style="font-size: 18px; vertical-align: middle; margin-right: 8px;"></ion-icon>
                        LinkedIn
                    </button>
                </div>

                <div class="register-link">
                    Don't have an account? <a href="register-select.html">Register now</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <script type="module" src="js/login.js"></script>
</body>
</html>
