<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAO Dashboard - SAO E-Record</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#374426',
                        secondary: '#47622a',
                        accent: '#799851',
                        light: '#9fb878',
                        cream: '#dfddd1'
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body class="bg-cream">
    <div class="flex h-screen">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-primary text-white flex flex-col">
            <div class="p-6 text-center border-b border-secondary">
                <img id="sidebarProfilePic" src="https://via.placeholder.com/80" alt="Profile" class="w-20 h-20 rounded-full mx-auto mb-3">
                <h3 id="sidebarName" class="font-semibold text-lg">SAO Coordinator</h3>
            </div>
            
            <div class="p-4">
                <input type="text" id="searchBar" placeholder="Search..." 
                    class="w-full px-3 py-2 rounded-lg bg-secondary text-white placeholder-gray-300 focus:outline-none">
            </div>
            
            <nav class="flex-1 px-4 overflow-y-auto">
                <a href="#" data-page="profile" class="nav-link flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-secondary transition mb-2">
                    <ion-icon name="person-outline" class="text-xl"></ion-icon>
                    <span>Profile</span>
                </a>
                <a href="#" data-page="dashboard" class="nav-link flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-secondary transition mb-2 bg-secondary">
                    <ion-icon name="stats-chart-outline" class="text-xl"></ion-icon>
                    <span>Dashboard</span>
                </a>
                <a href="#" data-page="sections" class="nav-link flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-secondary transition mb-2">
                    <ion-icon name="folder-outline" class="text-xl"></ion-icon>
                    <span>Section Folders</span>
                </a>
                <a href="#" data-page="appointments" class="nav-link flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-secondary transition mb-2">
                    <ion-icon name="calendar-outline" class="text-xl"></ion-icon>
                    <span>Appointments</span>
                </a>
                <a href="#" data-page="notifications" class="nav-link flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-secondary transition mb-2">
                    <ion-icon name="notifications-outline" class="text-xl"></ion-icon>
                    <span>Send Notifications</span>
                </a>
            </nav>
            
            <div class="p-4 border-t border-secondary">
                <button id="logoutBtn" class="w-full flex items-center justify-center space-x-2 px-4 py-3 bg-red-600 hover:bg-red-700 rounded-lg transition">
                    <ion-icon name="log-out-outline" class="text-xl"></ion-icon>
                    <span>Logout</span>
                </button>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 overflow-y-auto">
            <header class="bg-white shadow-md p-6">
                <h1 class="text-2xl font-bold text-primary">SAO Coordinator Dashboard</h1>
            </header>
            
            <div id="contentArea" class="p-6">
                <!-- Content will be loaded here dynamically -->
            </div>
        </main>
    </div>

    <script src="js/sao-dashboard.js"></script>
</body>
</html>
